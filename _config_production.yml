# 生产环境配置
# 在部署时使用: jekyll build --config _config.yml,_config_production.yml

# 生产环境URL
url: "https://smart-contract-security.guide"

# 生产环境优化
future: false  # 不显示未来的文章
show_drafts: false  # 不显示草稿

# 生产环境插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 生产环境分析（如果需要）
# google_analytics: UA-XXXXXXXX-X

# 生产环境评论系统（如果需要）
# disqus:
#   shortname: your-disqus-shortname

# 生产环境CDN（如果需要）
# cdn_url: "https://cdn.yourdomain.com"

# 生产环境缓存设置
cache_buster: true

# 生产环境压缩
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false

# 生产环境安全头
security_headers: true